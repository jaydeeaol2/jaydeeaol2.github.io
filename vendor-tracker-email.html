<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vendor Tracker">
<title>Vendor Repair Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0f1117;--surface:#181c27;--surface2:#1f2436;--border:#2a2f42;--border2:#363d54;
    --text:#e8eaf0;--muted:#7b82a0;--accent:#4f8ef7;--accent-dim:#1e3a6e;
    --pending-bg:#162440;--pending-fg:#6eaaff;--pending-dot:#4f8ef7;
    --inprog-bg:#2a1f08;--inprog-fg:#f5b942;--inprog-dot:#e09a1a;
    --done-bg:#0d2818;--done-fg:#4eca7e;--done-dot:#2ab564;
    --cancel-bg:#1e1e24;--cancel-fg:#7b82a0;--cancel-dot:#555a70;
    --red:#CC0000;--red-dark:#990000;--red-muted:#ff000018;
    --radius:10px;--radius-lg:16px;--shadow:0 4px 24px rgba(0,0,0,0.4);
    --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}

  /* ── HEADER ── */
  .header{background:var(--surface);border-bottom:3px solid var(--red);padding:0 20px;position:sticky;top:0;z-index:50}
  .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px}
  .logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;letter-spacing:-.3px}
  .logo-icon{width:32px;height:32px;flex-shrink:0}
  .logo-label{color:var(--text)}
  .logo-sub{font-family:var(--mono);font-size:9px;color:var(--red);text-transform:uppercase;letter-spacing:.1em;display:block;margin-top:1px}

  /* ── NAV TABS ── */
  .nav-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .nav-tabs::-webkit-scrollbar{display:none}
  .nav-tab{padding:12px 16px;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
  .nav-tab.active{color:var(--text);border-bottom-color:var(--red)}
  .nav-tab:hover:not(.active){color:var(--text)}

  .btn-add{padding:7px 14px;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:12px;font-weight:600;font-family:var(--font);border:none;cursor:pointer;white-space:nowrap;transition:opacity .15s}
  .btn-add:hover{opacity:.85}

  /* ── MAIN ── */
  .main{max-width:1100px;margin:0 auto;padding:20px 20px 60px}

  .sync-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:12px;color:var(--muted)}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--done-dot)}
  .sync-dot.loading{background:var(--inprog-dot);animation:pulse 1s infinite}
  .sync-dot.error{background:#e05555}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── CALENDAR ── */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .cal-month{font-size:20px;font-weight:600;letter-spacing:-.5px}
  .arr-btn{width:34px;height:34px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .arr-btn:hover{background:var(--border2)}
  .cal-today-btn{padding:6px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:13px;font-family:var(--font);cursor:pointer;transition:all .15s}
  .cal-today-btn:hover{color:var(--text)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--border);gap:1px}
  .cal-dow{background:var(--surface2);padding:10px 0;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .cal-cell{background:var(--surface);min-height:100px;padding:7px;cursor:pointer;transition:background .12s}
  .cal-cell:hover{background:var(--surface2)}
  .cal-cell.faded{background:var(--bg)}
  .cal-cell.faded .cal-day-num{color:#3a3f55}
  .cal-cell.is-today{background:#141928}
  .cal-cell.is-today .cal-day-num{color:var(--accent);background:var(--accent-dim);border-radius:6px;padding:1px 6px;width:fit-content}
  .cal-day-num{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;font-family:var(--mono)}
  .chip{font-size:11px;font-weight:500;padding:3px 6px;border-radius:5px;margin-bottom:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;display:block;cursor:pointer}
  .chip-pending{background:var(--pending-bg);color:var(--pending-fg)}
  .chip-in-progress{background:var(--inprog-bg);color:var(--inprog-fg)}
  .chip-done{background:var(--done-bg);color:var(--done-fg)}
  .chip-cancelled{background:var(--cancel-bg);color:var(--cancel-fg)}
  .chip-more{font-size:10px;color:var(--muted);padding:1px 4px}

  /* ── LIST ── */
  .list-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .filter-btn{padding:6px 14px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
  .filter-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
  .filter-dot{width:7px;height:7px;border-radius:50%}
  .list-items{display:flex;flex-direction:column;gap:8px}
  .list-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:border-color .15s,background .15s}
  .list-item:hover{border-color:var(--border2);background:var(--surface2)}
  .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .dot-pending{background:var(--pending-dot)}
  .dot-in-progress{background:var(--inprog-dot)}
  .dot-done{background:var(--done-dot)}
  .dot-cancelled{background:var(--cancel-dot)}
  .li-body{flex:1;min-width:0}
  .li-vendor{font-size:14px;font-weight:600;color:var(--text)}
  .li-meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .li-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .li-btn{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;font-family:var(--font);cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .15s}
  .li-btn:hover{color:var(--text);border-color:var(--border2)}
  .li-btn.email{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
  .li-btn.email:hover{opacity:.85}
  .status-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0}
  .badge-pending{background:var(--pending-bg);color:var(--pending-fg)}
  .badge-in-progress{background:var(--inprog-bg);color:var(--inprog-fg)}
  .badge-done{background:var(--done-bg);color:var(--done-fg)}
  .badge-cancelled{background:var(--cancel-bg);color:var(--cancel-fg)}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
  .empty-icon{font-size:36px;margin-bottom:12px}
  .stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;gap:8px;flex:1;min-width:110px}
  .stat-num{font-size:22px;font-weight:700;font-family:var(--mono)}
  .stat-lbl{font-size:11px;color:var(--muted);font-weight:500}
  .list-sort{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .sort-label{font-size:12px;color:var(--muted)}
  .sort-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;font-family:var(--font);padding:5px 10px;border-radius:8px;cursor:pointer;outline:none}

  /* ── EMAIL GENERATOR (light panel) ── */
  .email-panel{background:#F8F5F0;color:#1A1410;border-radius:var(--radius-lg);padding:20px;min-height:400px}
  .ep-section{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--red);margin:22px 0 10px}
  .ep-section:first-child{margin-top:0}
  .ep-field{margin-bottom:12px}
  .ep-field label{display:block;font-size:13px;font-weight:500;color:#6B5E52;margin-bottom:5px}
  .ep-field label .opt{color:#D4C9BB;font-weight:400;font-size:11px}
  .ep-field label .req{color:var(--red)}
  .ep-field input,.ep-field select,.ep-field textarea{width:100%;padding:11px 13px;border:1.5px solid #D4C9BB;border-radius:8px;font-family:var(--font);font-size:14px;background:#fff;color:#1A1410;outline:none;appearance:none;-webkit-appearance:none;transition:border-color .18s}
  .ep-field input:focus,.ep-field select:focus,.ep-field textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-muted)}
  .ep-field textarea{resize:vertical;min-height:72px}
  .ep-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .prefill-banner{background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--accent);display:none;align-items:center;gap:8px}
  .prefill-banner.show{display:flex}
  .prefill-clear{margin-left:auto;cursor:pointer;opacity:.7;font-size:14px}
  .prefill-clear:hover{opacity:1}

  .repairs-table{border:1.5px solid #D4C9BB;border-radius:8px;overflow:hidden;background:#fff}
  .rt-header{display:grid;grid-template-columns:1fr 100px 36px;gap:6px;padding:8px 10px;background:#EDE8E0;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#6B5E52}
  .rt-row{display:grid;grid-template-columns:1fr 100px 36px;gap:6px;padding:8px 10px;border-top:1px solid #EDE8E0;align-items:center}
  .rt-row input{padding:8px 10px;font-size:14px;border-radius:6px;border:1.5px solid #D4C9BB;font-family:var(--font);outline:none;background:#fff;color:#1A1410}
  .rt-row input:focus{border-color:var(--red)}
  .btn-add-row{width:100%;padding:10px;border:1.5px dashed #D4C9BB;border-top:none;background:none;color:#6B5E52;font-size:13px;cursor:pointer;font-family:var(--font);border-radius:0 0 8px 8px;transition:background .15s}
  .btn-add-row:hover{background:#EDE8E0}
  .del-btn{background:#fee;border:1px solid #fcc;color:var(--red);cursor:pointer;font-size:13px;padding:6px 8px;border-radius:5px;line-height:1;transition:background .15s}
  .del-btn:hover{background:#fdd}

  .status-chips{display:flex;gap:8px;flex-wrap:wrap}
  .s-chip{padding:8px 13px;border-radius:20px;border:1.5px solid #D4C9BB;font-size:13px;cursor:pointer;background:#fff;color:#6B5E52;font-family:var(--font);transition:all .15s;-webkit-user-select:none;user-select:none}
  .s-chip.active{background:var(--red);border-color:var(--red);color:#fff;font-weight:500}

  .generate-btn{width:100%;margin-top:24px;padding:15px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;letter-spacing:.04em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .18s}
  .generate-btn:hover{background:var(--red-dark)}

  /* Email output */
  .email-placeholder{text-align:center;padding:50px 20px;color:#6B5E52}
  .email-placeholder svg{opacity:.2;margin-bottom:14px}
  .email-placeholder p{font-size:14px;line-height:1.6;opacity:.7}
  .email-card{background:#fff;border:1.5px solid #D4C9BB;border-radius:10px;overflow:hidden;display:none}
  .email-meta{padding:12px 16px;border-bottom:1px solid #EDE8E0;background:#EDE8E0}
  .email-meta-row{display:flex;gap:8px;font-size:13px;padding:3px 0;align-items:baseline}
  .em-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#6B5E52;width:52px;flex-shrink:0}
  .em-value{color:#1A1410;font-weight:500;flex:1;word-break:break-all}
  #emailBody{width:100%;padding:16px;font-family:var(--font);font-size:14px;line-height:1.75;color:#1A1410;background:#F8F5F0;border:none;min-height:300px;resize:vertical;outline:none;white-space:pre-wrap;display:block}
  .action-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .action-btn{padding:12px 10px;border-radius:8px;border:1.5px solid #D4C9BB;background:#fff;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;color:#1A1410;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
  .action-btn:hover{background:#EDE8E0}
  .action-btn.primary{background:#1A1410;color:#fff;border-color:#1A1410;grid-column:1/-1}
  .action-btn.primary:hover{background:#333}

  /* ── MODAL ── */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;padding:20px}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .modal-title{font-size:16px;font-weight:600}
  .modal-close{width:28px;height:28px;border-radius:7px;background:var(--surface2);border:none;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .modal-close:hover{color:var(--text)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:14px;color:var(--text);font-family:var(--font);transition:border-color .15s;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:72px}
  .field select option{background:var(--surface2)}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;gap:8px;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
  .btn{padding:9px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:opacity .15s}
  .btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{opacity:.85}
  .btn-danger{background:#3d1515;color:#f47272;border:1px solid #5a2020}
  .btn-danger:hover{background:#4d1c1c}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);color:#fff;padding:12px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s cubic-bezier(.22,1,.36,1);pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.25)}
  .toast.show{transform:translateX(-50%) translateY(0)}

  .view{display:none}
  .view.active{display:block}

  @media(max-width:640px){
    .header-inner{height:auto;padding:10px 0;flex-wrap:wrap;gap:8px}
    .logo-label{font-size:13px}
    .cal-cell{min-height:70px;padding:5px}
    .chip{font-size:10px;padding:2px 5px}
    .cal-month{font-size:16px}
    .main{padding:16px 12px 60px}
    .ep-field-row{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
        <circle cx="19" cy="19" r="18" fill="#CC0000"/>
        <circle cx="19" cy="19" r="12" fill="white"/>
        <circle cx="19" cy="19" r="6" fill="#CC0000"/>
      </svg>
      <div>
        <span class="logo-label">Vendor Repair Tracker</span>
        <span class="logo-sub">Property Management Lead</span>
      </div>
    </div>
    <button class="btn-add" onclick="openAdd()">+ Add Job</button>
  </div>
</header>

<nav class="nav-tabs">
  <button class="nav-tab active" id="nav-calendar" onclick="switchTab('calendar')">📅 Calendar</button>
  <button class="nav-tab" id="nav-list" onclick="switchTab('list')">📋 List</button>
  <button class="nav-tab" id="nav-email" onclick="switchTab('email')">✉️ Email Generator</button>
</nav>

<main class="main">
  <div class="sync-bar">
    <div class="sync-dot loading" id="syncDot"></div>
    <span id="syncLabel">Connecting…</span>
  </div>

  <!-- ══ CALENDAR ══ -->
  <div id="view-calendar" class="view active">
    <div class="cal-nav">
      <div class="cal-month" id="calMonthLabel"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="cal-today-btn" onclick="goToday()">Today</button>
        <div style="display:flex;gap:6px">
          <button class="arr-btn" onclick="changeMonth(-1)">&#8249;</button>
          <button class="arr-btn" onclick="changeMonth(1)">&#8250;</button>
        </div>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- ══ LIST ══ -->
  <div id="view-list" class="view">
    <div class="stats-bar" id="statsBar"></div>
    <div class="list-filters" id="listFilters"></div>
    <div class="list-sort">
      <span class="sort-label">Sort by</span>
      <select class="sort-select" id="sortSelect" onchange="renderList()">
        <option value="date-asc">Date (oldest first)</option>
        <option value="date-desc">Date (newest first)</option>
        <option value="vendor">Vendor name</option>
        <option value="status">Status</option>
      </select>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- ══ EMAIL GENERATOR ══ -->
  <div id="view-email" class="view">
    <div class="email-panel">

      <!-- Prefill banner -->
      <div class="prefill-banner" id="prefillBanner">
        <span>✦</span>
        <span id="prefillMsg">Pre-filled from job</span>
        <span class="prefill-clear" onclick="clearPrefill()">✕</span>
      </div>

      <!-- Sub-tabs -->
      <div style="display:flex;gap:2px;background:#EDE8E0;border-radius:8px;padding:3px;margin-bottom:20px">
        <button class="ep-subtab active" id="subtab-details" onclick="switchSubtab('details')"
          style="flex:1;padding:8px;border:none;border-radius:6px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;background:#fff;color:#1A1410;transition:all .15s">
          📋 Details
        </button>
        <button class="ep-subtab" id="subtab-preview" onclick="switchSubtab('preview')"
          style="flex:1;padding:8px;border:none;border-radius:6px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;background:none;color:#6B5E52;transition:all .15s">
          ✉️ Preview
        </button>
      </div>

      <!-- DETAILS sub-panel -->
      <div id="ep-details">
        <div class="ep-section">Vendor Info</div>
        <div class="ep-field">
          <label>Vendor / Company Name <span class="req">*</span></label>
          <input type="text" id="eVendorName" placeholder="e.g. ABC Facility Services">
        </div>
        <div class="ep-field">
          <label>Contact Name <span class="req">*</span></label>
          <input type="text" id="eContactName" placeholder="e.g. Mike Johnson">
        </div>
        <div class="ep-field">
          <label>Vendor Email <span class="opt">(optional)</span></label>
          <input type="email" id="eVendorEmail" placeholder="contact@vendorcompany.com" inputmode="email">
        </div>

        <div class="ep-section">Repair Details</div>

        <div class="ep-field" style="margin-bottom:10px">
          <label>Add from calendar <span class="opt">(pick a job to add it as a repair item)</span></label>
          <div style="display:flex;gap:8px;align-items:center">

<script>
// ── Supabase ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://kkmvokqapfnzuvdcbulf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eFFUiuHHGTlb_Y-P_Ad2Lw_PG2UHW6y';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── State ─────────────────────────────────────────────────────────────────────
let jobs = [];
let editId = null;
let listFilter = 'all';
let currentTab = 'calendar';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let rowCount = 0;
let currentEmailStatus = 'no_update';

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const STATUS_ORDER = ['Pending','In Progress','Done','Cancelled'];

// ── Sync ──────────────────────────────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot'+(state==='loading'?' loading':state==='error'?' error':'');
  document.getElementById('syncLabel').textContent = msg;
}

async function loadJobs() {
  setSyncStatus('loading','Syncing…');
  const { data, error } = await db.from('jobs').select('*').order('date',{ascending:true});
  if (error) { setSyncStatus('error','Connection error'); return; }
  jobs = data || [];
  setSyncStatus('ok','Synced · '+jobs.length+' job'+(jobs.length!==1?'s':''));
  renderCal();
  populateJobPicker();
  if (currentTab==='list') renderList();
}

db.channel('jobs-live')
  .on('postgres_changes',{event:'*',schema:'public',table:'jobs'},()=>loadJobs())
  .subscribe();

// ── Helpers ───────────────────────────────────────────────────────────────────
function chipClass(s)  { return 'chip chip-'+s.toLowerCase().replace(' ','-'); }
function dotClass(s)   { return 'status-dot dot-'+s.toLowerCase().replace(' ','-'); }
function badgeClass(s) { return 'status-badge badge-'+s.toLowerCase().replace(' ','-'); }
function fmtDate(d) {
  if (!d) return '';
  return new Date(d+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtTime(t) {
  if (!t) return '';
  const [h,m]=t.split(':'); const hr=parseInt(h);
  return (hr%12||12)+':'+m+(hr<12?' AM':' PM');
}
function showToast(msg, bg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = bg||'#2E7D32';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  document.getElementById('view-'+tab).classList.add('active');
  if (tab==='list') renderList();
  if (tab==='calendar') renderCal();
}

function switchSubtab(name) {
  document.querySelectorAll('.ep-subtab').forEach(b=>{
    b.style.background = b.id==='subtab-'+name ? '#fff' : 'none';
    b.style.color = b.id==='subtab-'+name ? '#1A1410' : '#6B5E52';
  });
  document.getElementById('ep-details').style.display = name==='details' ? 'block' : 'none';
  document.getElementById('ep-preview').style.display = name==='preview' ? 'block' : 'none';
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function changeMonth(d) {
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
}
function goToday() { const n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); renderCal(); }

function renderCal() {
  document.getElementById('calMonthLabel').textContent = MONTHS[calMonth]+' '+calYear;
  const today=new Date();
  const firstDow=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();

  let html=DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=firstDow-1;i>=0;i--)
    html+=`<div class="cal-cell faded"><div class="cal-day-num">${prevDays-i}</div></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const dateStr=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayJobs=jobs.filter(j=>j.date===dateStr);
    let chips=dayJobs.slice(0,3).map(j=>
      `<span class="${chipClass(j.status)}" onclick="openEdit('${j.id}',event)">${j.vendor}</span>`
    ).join('');
    if(dayJobs.length>3) chips+=`<span class="chip chip-more">+${dayJobs.length-3} more</span>`;
    html+=`<div class="cal-cell${isToday?' is-today':''}" onclick="openAddDate('${dateStr}')">
      <div class="cal-day-num">${d}</div>${chips}</div>`;
  }
  const rem=(7-((firstDow+daysInMonth)%7))%7;
  for(let i=1;i<=rem;i++)
    html+=`<div class="cal-cell faded"><div class="cal-day-num">${i}</div></div>`;
  document.getElementById('calGrid').innerHTML=html;
}

// ── List ──────────────────────────────────────────────────────────────────────
function renderList() {
  const counts={all:jobs.length};
  STATUS_ORDER.forEach(s=>{counts[s]=jobs.filter(j=>j.status===s).length;});

  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card"><div><div class="stat-num">${counts.all}</div><div class="stat-lbl">Total</div></div></div>
    <div class="stat-card"><div><div class="stat-num" style="color:var(--pending-fg)">${counts['Pending']}</div><div class="stat-lbl">Pending</div></div></div>
    <div class="stat-card"><div><div class="stat-num" style="color:var(--inprog-fg)">${counts['In Progress']}</div><div class="stat-lbl">In Progress</div></div></div>
    <div class="stat-card"><div><div class="stat-num" style="color:var(--done-fg)">${counts['Done']}</div><div class="stat-lbl">Done</div></div></div>`;

  const filterDefs=[
    {key:'all',label:'All',color:'var(--muted)'},
    {key:'Pending',label:'Pending',color:'var(--pending-dot)'},
    {key:'In Progress',label:'In Progress',color:'var(--inprog-dot)'},
    {key:'Done',label:'Done',color:'var(--done-dot)'},
    {key:'Cancelled',label:'Cancelled',color:'var(--cancel-dot)'},
  ];
  document.getElementById('listFilters').innerHTML=filterDefs.map(f=>
    `<button class="filter-btn${listFilter===f.key?' active':''}" onclick="setFilter('${f.key}')">
      <span class="filter-dot" style="background:${f.color}"></span>${f.label}
      <span style="color:var(--muted);font-size:11px">${f.key==='all'?counts.all:(counts[f.key]||0)}</span>
    </button>`
  ).join('');

  let filtered=listFilter==='all'?[...jobs]:jobs.filter(j=>j.status===listFilter);
  const sort=document.getElementById('sortSelect').value;
  filtered.sort((a,b)=>{
    if(sort==='date-asc')  return (a.date||'').localeCompare(b.date||'');
    if(sort==='date-desc') return (b.date||'').localeCompare(a.date||'');
    if(sort==='vendor')    return (a.vendor||'').localeCompare(b.vendor||'');
    if(sort==='status')    return STATUS_ORDER.indexOf(a.status)-STATUS_ORDER.indexOf(b.status);
    return 0;
  });

  if(!filtered.length){
    document.getElementById('listItems').innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div>No jobs found.</div>`;
    return;
  }
  document.getElementById('listItems').innerHTML=filtered.map(j=>{
    const meta=[j.date?fmtDate(j.date):'',j.time?fmtTime(j.time):'',j.job||'',j.contact||'']
      .filter(Boolean).join(' · ');
    return `<div class="list-item">
      <div class="${dotClass(j.status)}"></div>
      <div class="li-body">
        <div class="li-vendor">${j.vendor||'Unknown'}</div>
        <div class="li-meta">${meta}</div>
        ${j.notes?`<div style="font-size:12px;color:var(--muted);margin-top:4px">${j.notes}</div>`:''}
        <div class="li-actions">
          <button class="li-btn" onclick="openEdit('${j.id}')">✏️ Edit</button>
          <button class="li-btn email" onclick="prefillEmail('${j.id}')">✉️ Generate Email</button>
        </div>
      </div>
      <span class="${badgeClass(j.status)}">${j.status}</span>
    </div>`;
  }).join('');
}

function setFilter(f){listFilter=f;renderList();}

// ── Pre-fill email from job ───────────────────────────────────────────────────
function prefillEmail(id) {
  const j = jobs.find(x=>x.id===id);
  if (!j) return;

  switchTab('email');
  switchSubtab('details');

  document.getElementById('eVendorName').value  = j.vendor  || '';
  document.getElementById('eContactName').value = j.contact || '';
  document.getElementById('eVendorEmail').value = j.email   || '';
  document.getElementById('eRequestDate').value = j.date    || '';

  // Clear and add one repair row with job description
  document.querySelectorAll('#repairsTable .rt-row').forEach(r=>r.remove());
  rowCount = 0;
  addRepairRow();
  const firstRow = document.querySelector('#repairsTable .rt-row');
  if (firstRow && j.job) firstRow.querySelector('.r-desc').value = j.job;

  // Show banner
  const banner = document.getElementById('prefillBanner');
  document.getElementById('prefillMsg').textContent = `Pre-filled from: ${j.vendor}`;
  banner.classList.add('show');

  showToast('✦ Email form pre-filled!', '#185FA5');
}

function clearPrefill() {
  document.getElementById('prefillBanner').classList.remove('show');
}

// ── Email generator ───────────────────────────────────────────────────────────
function addRepairRow() {
  rowCount++;
  const id = rowCount;
  const row = document.createElement('div');
  row.className = 'rt-row'; row.id = 'rrow-'+id;
  row.innerHTML = `
    <input type="text" class="r-desc" placeholder="e.g. HVAC — stockroom">
    <input type="text" class="r-wo" placeholder="WO #" inputmode="numeric">
    <button class="del-btn" onclick="delRow(${id})">✕</button>`;
  document.getElementById('repairsTable').appendChild(row);
}

function delRow(id) {
  const el = document.getElementById('rrow-'+id);
  if (el) el.remove();
}

function setStatusChip(el) {
  document.querySelectorAll('.s-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentEmailStatus = el.dataset.val;
}

function fmtDateLong(dateStr) {
  if (!dateStr) return null;
  return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}

function getRepairs() {
  const items = [];
  document.querySelectorAll('#repairsTable .rt-row').forEach(r=>{
    const desc = r.querySelector('.r-desc').value.trim();
    const wo   = r.querySelector('.r-wo').value.trim();
    if (desc) items.push({desc,wo});
  });
  return items;
}

function generateEmail() {
  const vendorName   = document.getElementById('eVendorName').value.trim();
  const contactName  = document.getElementById('eContactName').value.trim();
  const vendorEmail  = document.getElementById('eVendorEmail').value.trim();
  const requestDate  = document.getElementById('eRequestDate').value;
  const originalEta  = document.getElementById('eOriginalEta').value;
  const extraNotes   = document.getElementById('eExtraNotes').value.trim();
  const yourName     = document.getElementById('eYourName').value.trim();
  const storeNum     = document.getElementById('eStoreNum').value.trim();
  const storeAddress = document.getElementById('eStoreAddress').value.trim();
  const cityStateZip = document.getElementById('eStoreCityStateZip').value.trim();
  const repairs      = getRepairs();

  if (!vendorName || !contactName || !yourName || repairs.length===0) {
    showToast('⚠️ Fill in Vendor, Contact, Your Name & at least one repair.', '#b45309');
    return;
  }

  const today = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const allWOs = repairs.map(r=>r.wo).filter(Boolean);
  const woTag  = allWOs.length>0 ? ` — WO# ${allWOs.join(' / ')}` : '';
  const subject = `Repair Status & ETA Request${woTag}`;

  const repairBlock = repairs.map(r=>
    `  • ${r.desc}${r.wo ? '  (Work Order #: '+r.wo+')' : ''}`
  ).join('\n');

  let dateLine = '';
  if (requestDate) dateLine += `\nThis repair was originally requested on ${fmtDateLong(requestDate)}.`;
  if (originalEta) dateLine += ` At that time, we were given an estimated completion date of ${fmtDateLong(originalEta)}.`;

  const statusMap = {
    no_update:          `To date, we have not received an updated status or ETA on this work.`,
    waiting_parts:      `We understand that parts may still be pending — could you give us a sense of when those are expected to arrive and when the repair will be completed?`,
    tech_not_scheduled: `We are still waiting for a technician to be scheduled. Could you let us know when we can expect someone on-site?`,
    in_progress:        `We know work may already be underway — we just want to make sure we have a clear picture of where things stand and when we can expect completion.`,
    past_eta:           `We wanted to follow up as the original estimated completion date has now passed and the repair is still outstanding.`
  };
  const statusLine = statusMap[currentEmailStatus] || statusMap['no_update'];
  const notesLine  = extraNotes ? `\nFor additional context: ${extraNotes}` : '';

  let storeLine = '';
  if (storeNum)     storeLine += `\nTarget ${storeNum}`;
  if (storeAddress) storeLine += `\n${storeAddress}`;
  if (cityStateZip) storeLine += `\n${cityStateZip}`;

  const body =
`Hi ${contactName},

Hope you're having a good week! I'm reaching out to check in on the status of the following open repair${repairs.length>1?'s':''} at our facility:

${repairBlock}
${dateLine}

${statusLine}${notesLine}

Could you please provide:
  1. Current status of the repair
  2. Updated ETA for completion
  3. Any parts, access, or approvals you may still need from our end

We appreciate everything your team does and just want to make sure we're staying on top of things on our end as well. Please don't hesitate to reach out if there's anything we can do to help move this along.

Thanks so much — looking forward to hearing from you!

${yourName}
Property Management Lead${storeLine}
Target Corporation
${today}`;

  document.getElementById('emailPlaceholder').style.display = 'none';
  document.getElementById('emailCard').style.display = 'block';
  document.getElementById('actionBar').style.display = 'grid';
  document.getElementById('displayTo').textContent = vendorEmail || contactName+' <'+vendorName+'>';
  document.getElementById('displaySubject').textContent = subject;
  document.getElementById('emailBody').value = body;
  window._subject = subject;
  window._toEmail = vendorEmail;

  switchSubtab('preview');
  showToast('✓ Email generated!', '#2E7D32');
}

function copyBody() {
  const text = document.getElementById('emailBody').value;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(()=>showToast('✓ Email body copied!','#2E7D32'));
  } else {
    document.getElementById('emailBody').select();
    document.execCommand('copy');
    showToast('✓ Copied!','#2E7D32');
  }
}
function copyAll() {
  const full = `Subject: ${document.getElementById('displaySubject').textContent}\n\n${document.getElementById('emailBody').value}`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(full).then(()=>showToast('✓ Full email copied!','#2E7D32'));
  } else {
    showToast('Use Copy Body on this device.','#2E7D32');
  }
}
function openMailto() {
  const to = window._toEmail||'';
  const subject = encodeURIComponent(window._subject||'');
  const body = encodeURIComponent(document.getElementById('emailBody').value);
  window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
}

// ── Job modal ─────────────────────────────────────────────────────────────────
function openAdd(){
  editId=null;
  document.getElementById('modalTitle').textContent='Add Job';
  document.getElementById('btnDelete').style.display='none';
  clearForm();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fVendor').focus(),100);
}
function openAddDate(dateStr){openAdd();document.getElementById('fDate').value=dateStr;}
function openEdit(id,e){
  if(e) e.stopPropagation();
  const j=jobs.find(x=>x.id===id); if(!j) return;
  editId=id;
  document.getElementById('modalTitle').textContent='Edit Job';
  document.getElementById('btnDelete').style.display='';
  document.getElementById('fVendor').value =j.vendor ||'';
  document.getElementById('fContact').value=j.contact||'';
  document.getElementById('fPhone').value  =j.phone  ||'';
  document.getElementById('fEmail').value  =j.email  ||'';
  document.getElementById('fDate').value   =j.date   ||'';
  document.getElementById('fTime').value   =j.time   ||'';
  document.getElementById('fJob').value    =j.job    ||'';
  document.getElementById('fStatus').value =j.status ||'Pending';
  document.getElementById('fNotes').value  =j.notes  ||'';
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function overlayClick(e){if(e.target.id==='overlay')closeModal();}
function clearForm(){
  ['fVendor','fContact','fPhone','fEmail','fDate','fTime','fJob','fNotes'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('fStatus').value='Pending';
}

async function saveJob(){
  const vendor=document.getElementById('fVendor').value.trim();
  if(!vendor){document.getElementById('fVendor').focus();return;}
  const btn=document.getElementById('btnSave');
  btn.textContent='Saving…';btn.disabled=true;
  const payload={
    vendor,
    contact:document.getElementById('fContact').value.trim(),
    phone:  document.getElementById('fPhone').value.trim(),
    email:  document.getElementById('fEmail').value.trim(),
    date:   document.getElementById('fDate').value||null,
    time:   document.getElementById('fTime').value||null,
    job:    document.getElementById('fJob').value.trim(),
    status: document.getElementById('fStatus').value,
    notes:  document.getElementById('fNotes').value.trim(),
  };
  let error;
  if(editId){({error}=await db.from('jobs').update(payload).eq('id',editId));}
  else{({error}=await db.from('jobs').insert(payload));}
  btn.textContent='Save Job';btn.disabled=false;
  if(error){alert('Error saving: '+error.message);return;}
  closeModal();
  await loadJobs();
}

async function deleteJob(){
  if(!editId||!confirm('Delete this job?')) return;
  const{error}=await db.from('jobs').delete().eq('id',editId);
  if(error){alert('Error: '+error.message);return;}
  closeModal();
  await loadJobs();
}

// ── Job picker dropdown ───────────────────────────────────────────────────────
function populateJobPicker() {
  const sel = document.getElementById('jobPicker');
  if (!sel) return;
  const current = sel.value;
  sel.innerHTML = '<option value="">— Select a job from calendar —</option>';
  const sorted = [...jobs].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  sorted.forEach(j => {
    const opt = document.createElement('option');
    opt.value = j.id;
    const dateLabel = j.date ? new Date(j.date+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
    const statusIcon = j.status==='Pending'?'🔵':j.status==='In Progress'?'🟡':j.status==='Done'?'🟢':'⚫';
    opt.textContent = `${statusIcon} ${j.vendor}${dateLabel?' · '+dateLabel:''}${j.job?' — '+j.job:''}`;
    sel.appendChild(opt);
  });
  if (current) sel.value = current;
}

function addJobFromPicker() {
  const sel = document.getElementById('jobPicker');
  const id = sel.value;
  if (!id) { showToast('⚠️ Select a job first.','#b45309'); return; }
  const j = jobs.find(x=>x.id===id);
  if (!j) return;

  // Add as repair row
  rowCount++;
  const rid = rowCount;
  const row = document.createElement('div');
  row.className='rt-row'; row.id='rrow-'+rid;
  row.innerHTML=`
    <input type="text" class="r-desc" value="${(j.job||j.vendor||'').replace(/"/g,'&quot;')}" placeholder="e.g. HVAC — stockroom">
    <input type="text" class="r-wo" placeholder="WO #" inputmode="numeric">
    <button class="del-btn" onclick="delRow(${rid})">✕</button>`;
  document.getElementById('repairsTable').appendChild(row);

  // Auto-fill vendor/contact/email if not already filled
  if (!document.getElementById('eVendorName').value && j.vendor)
    document.getElementById('eVendorName').value = j.vendor;
  if (!document.getElementById('eContactName').value && j.contact)
    document.getElementById('eContactName').value = j.contact;
  if (!document.getElementById('eVendorEmail').value && j.email)
    document.getElementById('eVendorEmail').value = j.email;
  if (!document.getElementById('eRequestDate').value && j.date)
    document.getElementById('eRequestDate').value = j.date;

  // Reset picker
  sel.value = '';
  showToast('✓ Job added as repair item','#2E7D32');
}

// ── Init ──────────────────────────────────────────────────────────────────────
addRepairRow();
renderCal();
loadJobs();
</script>
