<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Repair Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0f1117;
    --surface:   #181c27;
    --surface2:  #1f2436;
    --border:    #2a2f42;
    --border2:   #363d54;
    --text:      #e8eaf0;
    --muted:     #7b82a0;
    --accent:    #4f8ef7;
    --accent-dim:#1e3a6e;

    --pending-bg:  #162440; --pending-fg:  #6eaaff; --pending-dot: #4f8ef7;
    --inprog-bg:   #2a1f08; --inprog-fg:   #f5b942; --inprog-dot:  #e09a1a;
    --done-bg:     #0d2818; --done-fg:     #4eca7e; --done-dot:    #2ab564;
    --cancel-bg:   #1e1e24; --cancel-fg:   #7b82a0; --cancel-dot:  #555a70;

    --radius:  10px;
    --radius-lg: 16px;
    --shadow:  0 4px 24px rgba(0,0,0,0.4);
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    position: sticky; top: 0; z-index: 50;
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px; gap: 12px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
  }
  .logo-icon {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .tabs {
    display: flex; gap: 2px;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 3px;
  }
  .tab {
    padding: 6px 16px; border-radius: 7px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; background: none;
    color: var(--muted); transition: all .15s;
  }
  .tab.active { background: var(--surface); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text); }

  .btn-add {
    padding: 7px 16px; border-radius: var(--radius);
    background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 600; font-family: var(--font);
    border: none; cursor: pointer; white-space: nowrap;
    transition: opacity .15s;
  }
  .btn-add:hover { opacity: .85; }

  /* ── Main ── */
  .main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

  /* ── Calendar ── */
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .cal-month {
    font-size: 20px; font-weight: 600; letter-spacing: -0.5px;
  }
  .cal-arrows { display: flex; gap: 6px; }
  .arr-btn {
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .arr-btn:hover { background: var(--border2); }
  .cal-today-btn {
    padding: 6px 14px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: 13px; font-family: var(--font);
    cursor: pointer; transition: all .15s;
  }
  .cal-today-btn:hover { color: var(--text); border-color: var(--border2); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--border);
    gap: 1px;
  }
  .cal-dow {
    background: var(--surface2);
    padding: 10px 0;
    text-align: center;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted);
  }
  .cal-cell {
    background: var(--surface);
    min-height: 110px; padding: 8px;
    cursor: pointer; transition: background .12s;
    position: relative;
  }
  .cal-cell:hover { background: var(--surface2); }
  .cal-cell.faded { background: var(--bg); }
  .cal-cell.faded .cal-day-num { color: #3a3f55; }
  .cal-cell.is-today { background: #141928; }
  .cal-cell.is-today .cal-day-num {
    color: var(--accent);
    background: var(--accent-dim);
    border-radius: 6px;
    padding: 1px 6px;
    width: fit-content;
  }
  .cal-day-num {
    font-size: 12px; font-weight: 600;
    color: var(--muted); margin-bottom: 5px;
    font-family: var(--mono);
  }
  .chip {
    font-size: 11px; font-weight: 500;
    padding: 3px 7px; border-radius: 5px;
    margin-bottom: 3px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    max-width: 100%; display: block; cursor: pointer;
  }
  .chip-pending    { background: var(--pending-bg); color: var(--pending-fg); }
  .chip-in-progress{ background: var(--inprog-bg);  color: var(--inprog-fg); }
  .chip-done       { background: var(--done-bg);    color: var(--done-fg); }
  .chip-cancelled  { background: var(--cancel-bg);  color: var(--cancel-fg); }
  .chip-more { font-size: 10px; color: var(--muted); padding: 1px 4px; }

  /* ── List view ── */
  .list-filters {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; font-weight: 500; font-family: var(--font);
    cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px;
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .filter-dot { width: 7px; height: 7px; border-radius: 50%; }

  .list-items { display: flex; flex-direction: column; gap: 8px; }
  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    display: flex; gap: 14px; align-items: flex-start;
    cursor: pointer; transition: border-color .15s, background .15s;
  }
  .list-item:hover { border-color: var(--border2); background: var(--surface2); }
  .status-dot {
    width: 9px; height: 9px; border-radius: 50%;
    flex-shrink: 0; margin-top: 5px;
  }
  .dot-pending     { background: var(--pending-dot); }
  .dot-in-progress { background: var(--inprog-dot); }
  .dot-done        { background: var(--done-dot); }
  .dot-cancelled   { background: var(--cancel-dot); }
  .li-body { flex: 1; min-width: 0; }
  .li-vendor { font-size: 14px; font-weight: 600; color: var(--text); }
  .li-meta {
    font-size: 12px; color: var(--muted); margin-top: 3px;
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  }
  .li-meta-sep { color: var(--border2); }
  .status-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; flex-shrink: 0;
  }
  .badge-pending     { background: var(--pending-bg); color: var(--pending-fg); }
  .badge-in-progress { background: var(--inprog-bg);  color: var(--inprog-fg); }
  .badge-done        { background: var(--done-bg);    color: var(--done-fg); }
  .badge-cancelled   { background: var(--cancel-bg);  color: var(--cancel-fg); }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 14px;
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  /* ── Modal ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.65); z-index: 200;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow);
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close {
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--surface2); border: none;
    color: var(--muted); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { color: var(--text); }

  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .07em;
    color: var(--muted); margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 9px 12px;
    font-size: 14px; color: var(--text); font-family: var(--font);
    transition: border-color .15s; outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field textarea { resize: vertical; min-height: 72px; }
  .field select option { background: var(--surface2); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-actions {
    display: flex; gap: 8px; justify-content: space-between;
    margin-top: 20px; padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .btn { padding: 9px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 600; font-family: var(--font); cursor: pointer; border: none; transition: opacity .15s; }
  .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .85; }
  .btn-danger { background: #3d1515; color: #f47272; border: 1px solid #5a2020; }
  .btn-danger:hover { background: #4d1c1c; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .header-inner { height: auto; padding: 10px 0; flex-wrap: wrap; gap: 8px; }
    .logo-label { display: none; }
    .cal-cell { min-height: 72px; padding: 5px; }
    .chip { font-size: 10px; padding: 2px 5px; }
    .cal-month { font-size: 16px; }
    .main { padding: 16px 12px 60px; }
  }

  /* ── View transitions ── */
  .view { display: none; }
  .view.active { display: block; }

  .list-sort {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .sort-label { font-size: 12px; color: var(--muted); }
  .sort-select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 12px; font-family: var(--font);
    padding: 5px 10px; border-radius: 8px; cursor: pointer; outline: none;
  }
  .stats-bar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 16px;
    display: flex; align-items: center; gap: 8px; flex: 1; min-width: 110px;
  }
  .stat-num { font-size: 22px; font-weight: 700; font-family: var(--mono); }
  .stat-lbl { font-size: 11px; color: var(--muted); font-weight: 500; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🔧</div>
      <span class="logo-label">Vendor Repair Tracker</span>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('calendar')">📅 Calendar</button>
      <button class="tab" onclick="switchTab('list')">📋 List</button>
    </div>
    <button class="btn-add" onclick="openAdd()">+ Add Job</button>
  </div>
</header>

<main class="main">

  <!-- CALENDAR VIEW -->
  <div id="view-calendar" class="view active">
    <div class="cal-nav">
      <div class="cal-month" id="calMonthLabel"></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="cal-today-btn" onclick="goToday()">Today</button>
        <div class="cal-arrows">
          <button class="arr-btn" onclick="changeMonth(-1)">&#8249;</button>
          <button class="arr-btn" onclick="changeMonth(1)">&#8250;</button>
        </div>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- LIST VIEW -->
  <div id="view-list" class="view">
    <div class="stats-bar" id="statsBar"></div>
    <div class="list-filters" id="listFilters"></div>
    <div class="list-sort">
      <span class="sort-label">Sort by</span>
      <select class="sort-select" id="sortSelect" onchange="renderList()">
        <option value="date-asc">Date (oldest first)</option>
        <option value="date-desc">Date (newest first)</option>
        <option value="vendor">Vendor name</option>
        <option value="status">Status</option>
      </select>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

</main>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Job</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="field">
      <label>Vendor / Job Description *</label>
      <input id="fVendor" type="text" placeholder="e.g. RTU-10 no cool">
    </div>
    <div class="field">
      <label>Contact Name</label>
      <input id="fContact" type="text" placeholder="e.g. John Brennan">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Phone</label>
        <input id="fPhone" type="tel" placeholder="714-555-0100">
      </div>
      <div class="field">
        <label>Email</label>
        <input id="fEmail" type="email" placeholder="vendor@example.com">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Escalation Date</label>
        <input id="fDate" type="date">
      </div>
      <div class="field">
        <label>Time</label>
        <input id="fTime" type="time">
      </div>
    </div>
    <div class="field">
      <label>Job / Repair Type</label>
      <input id="fJob" type="text" placeholder="e.g. AC inspection, plumbing repair">
    </div>
    <div class="field">
      <label>Status</label>
      <select id="fStatus">
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Done">Done</option>
        <option value="Cancelled">Cancelled</option>
      </select>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="fNotes" placeholder="Additional details, follow-up info…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-danger" id="btnDelete" style="display:none" onclick="deleteJob()">Delete</button>
      <div style="display:flex;gap:8px;margin-left:auto;">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveJob()">Save Job</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Data ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'vendorJobs_v1';
let jobs = [];
try { jobs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { jobs = []; }

function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs)); } catch(e) {}
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ── State ────────────────────────────────────────────────────────────────────
let curDate = new Date();
let calYear = curDate.getFullYear();
let calMonth = curDate.getMonth();
let editId = null;
let listFilter = 'all';
let currentTab = 'calendar';

// ── Status helpers ───────────────────────────────────────────────────────────
const STATUS_ORDER = ['Pending','In Progress','Done','Cancelled'];

function chipClass(s) {
  return 'chip chip-' + s.toLowerCase().replace(' ', '-');
}
function dotClass(s) {
  return 'status-dot dot-' + s.toLowerCase().replace(' ', '-');
}
function badgeClass(s) {
  return 'status-badge badge-' + s.toLowerCase().replace(' ', '-');
}
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':');
  const hr = parseInt(h);
  return (hr % 12 || 12) + ':' + m + (hr < 12 ? ' AM' : ' PM');
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
  if (tab === 'list') renderList();
  if (tab === 'calendar') renderCal();
}

// ── Calendar ─────────────────────────────────────────────────────────────────
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

function changeMonth(d) {
  calMonth += d;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCal();
}
function goToday() {
  const n = new Date();
  calYear = n.getFullYear(); calMonth = n.getMonth();
  renderCal();
}

function renderCal() {
  document.getElementById('calMonthLabel').textContent =
    MONTHS[calMonth] + ' ' + calYear;

  const today = new Date();
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  let html = DAYS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // prev month padding
  for (let i = firstDow - 1; i >= 0; i--) {
    html += `<div class="cal-cell faded"><div class="cal-day-num">${prevDays - i}</div></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = today.getFullYear() === calYear &&
                    today.getMonth() === calMonth &&
                    today.getDate() === d;
    const dateStr = calYear + '-' +
      String(calMonth + 1).padStart(2,'0') + '-' +
      String(d).padStart(2,'0');
    const dayJobs = jobs.filter(j => j.date === dateStr);

    let chips = dayJobs.slice(0, 3).map(j =>
      `<span class="${chipClass(j.status)}" onclick="openEdit('${j.id}',event)">${j.vendor}</span>`
    ).join('');
    if (dayJobs.length > 3)
      chips += `<span class="chip chip-more">+${dayJobs.length - 3} more</span>`;

    html += `<div class="cal-cell${isToday ? ' is-today' : ''}" onclick="openAddDate('${dateStr}')">
      <div class="cal-day-num">${d}</div>${chips}</div>`;
  }

  // next month padding
  const total = firstDow + daysInMonth;
  const remainder = (7 - (total % 7)) % 7;
  for (let i = 1; i <= remainder; i++) {
    html += `<div class="cal-cell faded"><div class="cal-day-num">${i}</div></div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

// ── List ──────────────────────────────────────────────────────────────────────
function renderList() {
  // Stats
  const counts = { all: jobs.length };
  STATUS_ORDER.forEach(s => { counts[s] = jobs.filter(j => j.status === s).length; });

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card">
      <div><div class="stat-num">${counts.all}</div><div class="stat-lbl">Total Jobs</div></div>
    </div>
    <div class="stat-card">
      <div><div class="stat-num" style="color:var(--pending-fg)">${counts['Pending']}</div><div class="stat-lbl">Pending</div></div>
    </div>
    <div class="stat-card">
      <div><div class="stat-num" style="color:var(--inprog-fg)">${counts['In Progress']}</div><div class="stat-lbl">In Progress</div></div>
    </div>
    <div class="stat-card">
      <div><div class="stat-num" style="color:var(--done-fg)">${counts['Done']}</div><div class="stat-lbl">Done</div></div>
    </div>`;

  // Filter buttons
  const filterDefs = [
    { key: 'all', label: 'All', color: 'var(--muted)' },
    { key: 'Pending',     label: 'Pending',     color: 'var(--pending-dot)' },
    { key: 'In Progress', label: 'In Progress', color: 'var(--inprog-dot)' },
    { key: 'Done',        label: 'Done',        color: 'var(--done-dot)' },
    { key: 'Cancelled',   label: 'Cancelled',   color: 'var(--cancel-dot)' },
  ];
  document.getElementById('listFilters').innerHTML = filterDefs.map(f =>
    `<button class="filter-btn${listFilter === f.key ? ' active' : ''}"
      onclick="setFilter('${f.key}')">
      <span class="filter-dot" style="background:${f.color}"></span>${f.label}
      <span style="color:var(--muted);font-size:11px">${f.key === 'all' ? counts.all : (counts[f.key] || 0)}</span>
    </button>`
  ).join('');

  // Sort + filter
  let filtered = listFilter === 'all' ? [...jobs] : jobs.filter(j => j.status === listFilter);
  const sort = document.getElementById('sortSelect').value;
  filtered.sort((a, b) => {
    if (sort === 'date-asc')  return (a.date || '').localeCompare(b.date || '');
    if (sort === 'date-desc') return (b.date || '').localeCompare(a.date || '');
    if (sort === 'vendor')    return (a.vendor || '').localeCompare(b.vendor || '');
    if (sort === 'status')    return STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status);
    return 0;
  });

  if (!filtered.length) {
    document.getElementById('listItems').innerHTML =
      `<div class="empty-state"><div class="empty-icon">📋</div>No jobs found.</div>`;
    return;
  }

  document.getElementById('listItems').innerHTML = filtered.map(j => {
    const meta = [
      j.date ? fmtDate(j.date) : '',
      j.time ? fmtTime(j.time) : '',
      j.job  ? j.job : '',
      j.contact ? j.contact : '',
    ].filter(Boolean).join(' <span class="li-meta-sep">·</span> ');

    return `<div class="list-item" onclick="openEdit('${j.id}')">
      <div class="${dotClass(j.status)}"></div>
      <div class="li-body">
        <div class="li-vendor">${j.vendor || 'Unknown vendor'}</div>
        <div class="li-meta">${meta}</div>
        ${j.notes ? `<div style="font-size:12px;color:var(--muted);margin-top:4px">${j.notes}</div>` : ''}
      </div>
      <span class="${badgeClass(j.status)}">${j.status}</span>
    </div>`;
  }).join('');
}

function setFilter(f) {
  listFilter = f;
  renderList();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openAdd() {
  editId = null;
  document.getElementById('modalTitle').textContent = 'Add Job';
  document.getElementById('btnDelete').style.display = 'none';
  clearForm();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('fVendor').focus();
}

function openAddDate(dateStr) {
  openAdd();
  document.getElementById('fDate').value = dateStr;
}

function openEdit(id, e) {
  if (e) e.stopPropagation();
  const j = jobs.find(x => x.id === id);
  if (!j) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'Edit Job';
  document.getElementById('btnDelete').style.display = '';
  document.getElementById('fVendor').value  = j.vendor  || '';
  document.getElementById('fContact').value = j.contact || '';
  document.getElementById('fPhone').value   = j.phone   || '';
  document.getElementById('fEmail').value   = j.email   || '';
  document.getElementById('fDate').value    = j.date    || '';
  document.getElementById('fTime').value    = j.time    || '';
  document.getElementById('fJob').value     = j.job     || '';
  document.getElementById('fStatus').value  = j.status  || 'Pending';
  document.getElementById('fNotes').value   = j.notes   || '';
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}
function overlayClick(e) {
  if (e.target.id === 'overlay') closeModal();
}

function clearForm() {
  ['fVendor','fContact','fPhone','fEmail','fDate','fTime','fJob','fNotes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('fStatus').value = 'Pending';
}

function saveJob() {
  const vendor = document.getElementById('fVendor').value.trim();
  if (!vendor) { document.getElementById('fVendor').focus(); return; }

  const job = {
    id:      editId || uid(),
    vendor,
    contact: document.getElementById('fContact').value.trim(),
    phone:   document.getElementById('fPhone').value.trim(),
    email:   document.getElementById('fEmail').value.trim(),
    date:    document.getElementById('fDate').value,
    time:    document.getElementById('fTime').value,
    job:     document.getElementById('fJob').value.trim(),
    status:  document.getElementById('fStatus').value,
    notes:   document.getElementById('fNotes').value.trim(),
  };

  if (editId) {
    jobs = jobs.map(j => j.id === editId ? job : j);
  } else {
    jobs.push(job);
  }

  persist();
  closeModal();
  renderCal();
  if (currentTab === 'list') renderList();
}

function deleteJob() {
  if (!editId || !confirm('Delete this job?')) return;
  jobs = jobs.filter(j => j.id !== editId);
  persist();
  closeModal();
  renderCal();
  if (currentTab === 'list') renderList();
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderCal();
</script>
</body>
</html>
